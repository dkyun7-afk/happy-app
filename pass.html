<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행복한오늘 - 행복패스</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f6f8; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .mobile-container { background-color: #ffffff; width: 100%; max-width: 400px; height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .header { background-color: #2b7a3b; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem;}
        .content { padding: 30px 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; color: #333;}
        .subtitle { font-size: 1rem; color: #666; margin-bottom: 30px; line-height: 1.5; }
        .btn-primary { background-color: #2b7a3b; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: auto; transition: 0.2s;}
        .btn-primary:disabled { background-color: #cccccc; cursor: not-allowed; }
        .terms-box { background-color: #f9f9f9; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .term-item { display: flex; align-items: center; margin-bottom: 15px; }
        .term-item input { width: 22px; height: 22px; margin-right: 10px; accent-color: #2b7a3b;}
        .term-item label { font-size: 1rem; color: #333; }
        .screen { display: none; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #2b7a3b; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="mobile-container">
    
    <div id="screen1" class="screen active">
        <div class="header">행복한오늘 매니저</div>
        <div class="content">
            <div class="title">환영합니다! 🎉</div>
            <div class="subtitle"><span id="displayFranchise" style="font-weight:bold; color:#2b7a3b;">행복한오늘</span>에서 보낸<br>전자 근로계약서가 도착했습니다.<br><br>안전하고 빠른 확인을 위해 카카오로 인증해주세요.</div>
            <button class="btn-primary" style="background:#FEE500; color:#191919;" onclick="nextScreen(2)">카카오로 시작하기</button>
        </div>
    </div>

    <div id="screen2" class="screen">
        <div class="header">권한 및 약관 동의</div>
        <div class="content">
            <div class="title">거의 다 왔어요!</div>
            <div class="subtitle">계약서 확인 및 서비스 이용을 위해<br>아래 약관에 동의해 주세요.</div>
            <div class="terms-box">
                <div class="term-item"><input type="checkbox" id="chk1" class="req" onclick="checkReq()"><label>[필수] 서비스 이용약관 동의</label></div>
                <div class="term-item"><input type="checkbox" id="chk2" class="req" onclick="checkReq()"><label>[필수] 개인정보 수집 및 이용 동의</label></div>
                <div class="term-item"><input type="checkbox" id="chk3"><label>[선택] 맞춤 알바/혜택 정보 수신 🎁</label></div>
            </div>
            <button id="btnSubmit" class="btn-primary" disabled onclick="registerCrew()">동의하고 시작하기</button>
        </div>
    </div>

    <div id="screen3" class="screen">
        <div class="content" style="justify-content:center; align-items:center; text-align:center;">
            <div class="loader"></div>
            <h2 style="color:#2b7a3b;">🚀 안전하게 등록 중...</h2>
            <p style="color:#666;">잠시만 기다려주세요.</p>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const storeName = urlParams.get('id') || '행복한오늘 강남본점';
    const crewName = urlParams.get('name') || '테스터';
    document.getElementById('displayFranchise').innerText = storeName;

    // ★ 오빠가 발급받은 진짜 심장 주소 장착 완료! ★
    const googleAppUrl = "https://script.google.com/macros/s/AKfycbxV-CC7ZZBleE7wS3Q8Ct4B4beGREIHYdPKM0zS2rpVyPlTxGHBJRlUFo4O07hfJRaV/exec";

    function nextScreen(step) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen' + step).classList.add('active');
    }

    function checkReq() {
        const r1 = document.getElementById('chk1').checked;
        const r2 = document.getElementById('chk2').checked;
        document.getElementById('btnSubmit').disabled = !(r1 && r2);
    }

    // 구글 시트로 데이터 쏘기!
    function registerCrew() {
        nextScreen(3); // 로딩 화면 띄우기
        
        const payload = {
            type: "REGISTRATION",
            storeName: storeName,
            name: crewName,
            phone: "010-1234-5678", // 테스트용 번호
            marketingAgreed: document.getElementById('chk3').checked
        };

        fetch(googleAppUrl, {
            method: "POST",
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(res => {
            if(res.result === "success") {
                // 성공하면 멋진 크루 라운지로 자동 이동!
                window.location.replace("crew.html?store=" + encodeURIComponent(storeName) + "&name=" + encodeURIComponent(crewName));
            }
        })
        .catch(error => {
            alert("통신 중 오류가 발생했습니다. 다시 시도해주세요.");
            nextScreen(2);
        });
    }
</script>
</body>
</html>
