<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행복한오늘 - 알바생 환영 패스</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f6f8; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .mobile-container { background-color: #ffffff; width: 100%; max-width: 400px; height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .header { background-color: #387b3b; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .content { padding: 30px 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 1.5rem; font-weight: bold; color: #333; margin-bottom: 10px; }
        .subtitle { font-size: 1rem; color: #666; margin-bottom: 40px; line-height: 1.5; }
        
        /* 버튼 스타일 */
        .btn-kakao { background-color: #FEE500; color: #191919; border: none; border-radius: 12px; padding: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-bottom: 15px; }
        .btn-primary { background-color: #387b3b; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: auto; }
        .btn-primary:disabled { background-color: #cccccc; cursor: not-allowed; }

        /* 약관 동의 화면 */
        .terms-box { background-color: #f9f9f9; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .term-item { display: flex; align-items: center; margin-bottom: 15px; }
        .term-item:last-child { margin-bottom: 0; }
        .term-item input[type="checkbox"] { width: 22px; height: 22px; margin-right: 10px; accent-color: #387b3b; cursor: pointer; }
        .term-item label { font-size: 1rem; color: #333; cursor: pointer; flex-grow: 1; }
        .highlight { color: #e74c3c; font-weight: bold; font-size: 0.85rem; background: #ffebeb; padding: 3px 8px; border-radius: 20px; margin-left: 5px; }

        /* 화면 전환용 클래스 */
        .screen { display: none; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }
        
        /* 로딩 텍스트 */
        .loading { text-align: center; color: #387b3b; font-weight: bold; margin-top: 50px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="mobile-container">
    
    <div id="screen1" class="screen active">
        <div class="header">행복한오늘 매니저</div>
        <div class="content">
            <div class="title">환영합니다! 🎉</div>
            <div class="subtitle">
                <span id="displayFranchise" style="font-weight:bold; color:#387b3b;">가맹점</span>에서 보낸<br>
                전자 근로계약서가 도착했습니다.<br><br>
                안전하고 빠른 확인을 위해<br>카카오로 3초 만에 본인인증을 진행해주세요.
            </div>
            
            <div style="flex-grow: 1;"></div> 
            
            <button class="btn-kakao" onclick="nextScreen(2)">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3C6.477 3 2 6.42 2 10.636c0 2.706 1.765 5.08 4.411 6.37l-1.127 4.103c-.092.336.275.61.57.433l4.743-3.155c.453.076.924.116 1.403.116 5.523 0 10-3.42 10-7.636C22 6.42 17.523 3 12 3z" fill="#191919"/></svg>
                카카오로 시작하기
            </button>
        </div>
    </div>

    <div id="screen2" class="screen">
        <div class="header">권한 및 약관 동의</div>
        <div class="content">
            <div class="title">거의 다 왔어요!</div>
            <div class="subtitle">계약서 확인 및 서비스 이용을 위해<br>아래 약관에 동의해 주세요.</div>
            
            <div class="terms-box">
                <div class="term-item">
                    <input type="checkbox" id="chkAll" onclick="toggleAll()">
                    <label for="chkAll" style="font-weight:bold;">전체 동의하기</label>
                </div>
                <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">
                <div class="term-item">
                    <input type="checkbox" id="chk1" class="req" onclick="checkRequired()">
                    <label for="chk1">[필수] 서비스 이용약관 동의</label>
                </div>
                <div class="term-item">
                    <input type="checkbox" id="chk2" class="req" onclick="checkRequired()">
                    <label for="chk2">[필수] 개인정보 수집 및 이용 동의</label>
                </div>
                <div class="term-item">
                    <input type="checkbox" id="chk3" onclick="checkRequired()">
                    <label for="chk3">[선택] 맞춤 알바/혜택 정보 수신</label>
                    <span class="highlight">🎁 커피 쿠폰!</span>
                </div>
            </div>
            
            <button id="btnSubmit" class="btn-primary" disabled onclick="nextScreen(3)">
                동의하고 계약서 확인하기
            </button>
        </div>
    </div>

    <div id="screen3" class="screen">
        <div class="header">서명 준비 완료</div>
        <div class="content" style="justify-content: center; align-items: center;">
            <div style="font-size: 4rem; margin-bottom: 20px;">🚀</div>
            <div class="title">본인 인증 완료!</div>
            <div class="subtitle" style="text-align: center;">행복한오늘 시스템으로<br>안전하게 이동합니다...</div>
            <div class="loading">잠시만 기다려주세요...</div>
        </div>
    </div>

</div>

<script>
    // URL에서 가맹점 이름 가져오기
    const urlParams = new URLSearchParams(window.location.search);
    const franchiseId = urlParams.get('id') || '사장님';
    document.getElementById('displayFranchise').innerText = franchiseId;

    // 오빠의 진짜 구글 앱스 스크립트 주소!
    const googleAppUrl = "https://script.google.com/macros/s/AKfycbxdsAoEPDwTB4Ypb2Maxx4msqb2Fb4aVIn_wqUVkmPtavZP0LX6v77HjkYq9FZlDEwB/exec";

    function nextScreen(step) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen' + step).classList.add('active');

        // 마지막 화면 도착 시, 1.5초 뒤에 진짜 구글 앱으로 이동!
        if(step === 3) {
            setTimeout(() => {
                window.location.replace(googleAppUrl + "?id=" + franchiseId);
            }, 1500);
        }
    }

    // 약관 전체 동의 체크 로직
    function toggleAll() {
        const isChecked = document.getElementById('chkAll').checked;
        document.getElementById('chk1').checked = isChecked;
        document.getElementById('chk2').checked = isChecked;
        document.getElementById('chk3').checked = isChecked;
        checkRequired();
    }

    // 필수 약관(1번, 2번)이 체크되었는지 확인해서 버튼 활성화
    function checkRequired() {
        const req1 = document.getElementById('chk1').checked;
        const req2 = document.getElementById('chk2').checked;
        const opt3 = document.getElementById('chk3').checked;
        
        document.getElementById('chkAll').checked = (req1 && req2 && opt3);

        const btn = document.getElementById('btnSubmit');
        if(req1 && req2) {
            btn.disabled = false;
        } else {
            btn.disabled = true;
        }
    }
</script>

</body>
</html>
